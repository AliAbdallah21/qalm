name: Compile LaTeX PDF
on:
  workflow_dispatch:
    inputs:
      cv_id:
        description: 'CV Generation ID'
        required: true
        type: string
jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-xetex \
            cm-super \
            fonts-font-awesome

      - name: Fetch LaTeX source
        run: |
          curl -sv \
            "${{ secrets.SUPABASE_URL }}/rest/v1/cv_generations?id=eq.${{ inputs.cv_id }}&select=latex_source,user_id,job_title,company_name" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -o response.json
          echo "=== Response content ==="
          cat response.json
          echo "=== End response ==="
          echo "=== Checking CV ID ==="
          echo "CV ID is: ${{ inputs.cv_id }}"
          python3 << 'PYEOF'
          import json
          import re
          import time

          def sanitize(text):
              if not text:
                  return ""
              # Lowercase
              text = text.lower()
              # Replace spaces with underscores
              text = text.replace(" ", "_")
              # Remove special characters except underscores and hyphens
              text = re.sub(r'[^a-z0-9_-]', '', text)
              # Clean up multiple underscores
              text = re.sub(r'_+', '_', text)
              return text.strip('_')

          with open('response.json') as f:
              data = json.load(f)
          
          item = data[0]
          with open('document.tex', 'w') as f:
              f.write(item['latex_source'])
          with open('user_id.txt', 'w') as f:
              f.write(item['user_id'])
          
          job_title = sanitize(item.get('job_title', 'cv'))
          company_name = sanitize(item.get('company_name', ''))
          timestamp = int(time.time() * 1000)
          
          if company_name:
              filename = f"{job_title}_{company_name}_{timestamp}.pdf"
          else:
              filename = f"{job_title}_{timestamp}.pdf"
              
          with open('filename.txt', 'w') as f:
              f.write(filename)

          print(f'Fetched successfully. Generated filename: {filename}')
          PYEOF

      - name: Set status to compiling
        run: |
          curl -s -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/cv_generations?id=eq.${{ inputs.cv_id }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"pdf_status":"compiling"}'

      - name: Compile LaTeX
        id: compile
        run: |
          pdflatex -interaction=nonstopmode document.tex
          pdflatex -interaction=nonstopmode document.tex
        continue-on-error: true

      - name: Upload PDF
        if: steps.compile.outcome == 'success'
        run: |
          USER_ID=$(cat user_id.txt)
          FILENAME=$(cat filename.txt)
          STORAGE_PATH="${USER_ID}/${FILENAME}"
          curl -s -X POST \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/cvs/${STORAGE_PATH}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/pdf" \
            --data-binary @document.pdf
          curl -s -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/cv_generations?id=eq.${{ inputs.cv_id }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"pdf_status\":\"ready\",\"pdf_url\":\"${{ secrets.SUPABASE_URL }}/storage/v1/object/public/cvs/${STORAGE_PATH}\"}"

      - name: Mark failed
        if: steps.compile.outcome == 'failure'
        run: |
          curl -s -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/cv_generations?id=eq.${{ inputs.cv_id }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"pdf_status":"failed","pdf_error":"LaTeX compilation failed"}'
